---
layout: default
---
<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <!-- Progress Bar -->
  <div id="reading-progress" class="reading-progress">
    <div id="progress-bar" class="progress-bar"></div>
  </div>

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      {%- assign date_format = site.minima.date_format | default: "%b %d, %Y" -%}
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: date_format }}
      </time>
      {%- if page.author -%}
        • <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">{{ page.author }}</span></span>
      {%- endif -%}
    </p>
  </header>

  <div class="post-container">
    <!-- Main Content -->
    <div class="post-content e-content" itemprop="articleBody" id="article-content">
      {{ content }}
    </div>

    <!-- Sidebar / TOC -->
    {% if page.toc != false %}
    <aside class="post-sidebar">
      <div class="sticky-toc">
        <h3>Table of Contents</h3>
        <nav id="toc"></nav>
      </div>
    </aside>
    {% endif %}
  </div>

</article>

<style>
  /* Progress Bar Styles */
  .reading-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background-color: transparent;
    z-index: 9999;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background-color: #0076df;
    background-image: linear-gradient(to right, #0076df, #00d4ff);
    transition: width 0.1s ease-out;
  }

  /* Layout Structure */
  .post-container {
    display: flex;
    flex-direction: row;
    gap: 2.5rem;
    margin-top: 2rem;
    position: relative;
  }

  .post-content {
    flex: 3;
    min-width: 0;
  }

  .post-sidebar {
    flex: 1;
    min-width: 220px;
    max-width: 280px;
  }

  @media (max-width: 768px) {
    .post-container {
      flex-direction: column;
    }
    .post-sidebar {
      display: none;
    }
  }

  /* Sticky TOC Styles */
  .sticky-toc {
    position: -webkit-sticky;
    position: sticky;
    top: 2rem;
    max-height: calc(100vh - 4rem);
    overflow-y: auto;
    padding-left: 1rem;
    border-left: 2px solid #e9ecef;
  }

  .sticky-toc h3 {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6c757d;
    margin-top: 0;
    margin-bottom: 1rem;
  }

  .sticky-toc ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }

  .sticky-toc li {
    margin-bottom: 0.75rem;
    font-size: 0.9rem;
    line-height: 1.3;
  }

  .sticky-toc a {
    color: #4a5568;
    text-decoration: none;
    transition: color 0.2s, font-weight 0.2s;
  }

  .sticky-toc a:hover,
  .sticky-toc a.active {
    color: #0076df;
    font-weight: 600;
  }

  .sticky-toc li.toc-h3 {
    padding-left: 1rem;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const article = document.getElementById('article-content');
    const progressBar = document.getElementById('progress-bar');
    const tocContainer = document.getElementById('toc');

    // 1. Reading Progress Bar
    window.addEventListener('scroll', () => {
      const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
      if (totalHeight > 0) {
        const progress = (window.pageYOffset / totalHeight) * 100;
        progressBar.style.width = progress + '%';
      }
    });

    // 2. Dynamic TOC Generation & Highlighting
    if (article && tocContainer) {
      const headings = article.querySelectorAll('h2, h3');
      if (headings.length > 0) {
        const tocList = document.createElement('ul');
        const headingMap = [];

        headings.forEach((heading) => {
          // Generate ID if missing
          if (!heading.id) {
            heading.id = heading.textContent
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/(^-|-$)/g, '');
          }

          const li = document.createElement('li');
          li.classList.add(heading.tagName.toLowerCase() === 'h3' ? 'toc-h3' : 'toc-h2');
          
          const a = document.createElement('a');
          a.setAttribute('href', '#' + heading.id);
          a.textContent = heading.textContent;
          li.appendChild(a);
          tocList.appendChild(li);

          headingMap.push({ heading, link: a });
        });

        tocContainer.appendChild(tocList);

        // Highlight active TOC item on scroll
        function highlightTOC() {
          let activeIndex = -1;
          const scrollPos = window.scrollY + 120; // offset top

          for (let i = 0; i < headingMap.length; i++) {
            if (scrollPos >= headingMap[i].heading.offsetTop) {
              activeIndex = i;
            } else {
              break;
            }
          }

          headingMap.forEach((item, index) => {
            if (index === activeIndex) {
              item.link.classList.add('active');
            } else {
              item.link.classList.remove('active');
            }
          });
        }

        window.addEventListener('scroll', highlightTOC);
        highlightTOC();
      } else {
        // Hide sidebar if no headings are present
        const sidebar = document.querySelector('.post-sidebar');
        if (sidebar) sidebar.style.display = 'none';
      }
    }
  });
</script>
