name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Build
  # ─────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Jekyll Doctor
        run: bundle exec jekyll doctor

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Verify build output
        run: |
          test -f _site/index.html || (echo "❌ index.html not found" && exit 1)
          test -f _site/sitemap.xml || (echo "❌ sitemap.xml not found" && exit 1)
          test -f _site/robots.txt || (echo "❌ robots.txt not found" && exit 1)
          echo "✅ Build artifacts verified"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _site/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Static Audit
  # ─────────────────────────────────────────────────────────────
  unit-test:
    name: 🧪 Static Audit
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run Static Audit
        run: npm run test:static-audit

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Deploy
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs:
      - build
      - unit-test

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
