name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Build ──────────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Verify build output
        run: |
          test -f _site/index.html || (echo "❌ index.html not found" && exit 1)
          test -f _site/sitemap.xml || (echo "❌ sitemap.xml not found" && exit 1)
          test -f _site/robots.txt || (echo "❌ robots.txt not found" && exit 1)
          echo "✅ Build artifacts verified"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _site/
          retention-days: 1

  # ── Stage 2: Unit Test (Static Audit) ───────────────────────────────────
  unit-test:
    name: 🧪 Unit Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Run static audit
        run: npm run test:static-audit

  # ── Stage 3-7: Playwright E2E Suite ─────────────────────────────────────
  playwright:
    name: 🎭 Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install firefox --with-deps

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site/

      - name: Ensure reports directory
        run: mkdir -p reports

      # ── 3. Content Validation ──────────────────────────────────────────
      - name: 📋 Content Validation
        run: npx playwright test tests/e2e/content-validation.spec.ts --project=firefox

      # ── 4. Accessibility Audit ─────────────────────────────────────────
      - name: ♿ Accessibility Audit
        run: npx playwright test tests/e2e/regression.spec.ts --grep "Accessibility Audit" --project=firefox

      # ── 5. SEO Validation ──────────────────────────────────────────────
      - name: 🔍 SEO Validation
        run: npx playwright test tests/e2e/seo-validation.spec.ts --project=firefox

      # ── 6. Visual Regression ───────────────────────────────────────────
      - name: 📸 Visual Regression
        run: npx playwright test tests/e2e/regression.spec.ts --grep "Visual Regression" --project=firefox

      # ── 7. Error Monitoring ────────────────────────────────────────────
      - name: 🛡️ Error Monitoring
        run: npx playwright test tests/e2e/regression.spec.ts --grep "Error Monitoring" --project=firefox

      # ── 8. Dynamic Crawl & Broken Link Audit ───────────────────────────
      - name: 🕷️ Dynamic Crawl & Broken Link Audit
        run: npx playwright test tests/e2e/crawler.spec.ts --project=firefox

      # ── Artifacts ──────────────────────────────────────────────────────
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/
          retention-days: 7

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-screenshots
          path: test-results/
          retention-days: 7

  # ── Stage 9: Deploy ─────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [build, unit-test, playwright]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
