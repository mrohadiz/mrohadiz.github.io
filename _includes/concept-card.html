<div class="concept-card" style="border: 1px solid var(--color-border); border-left: 4px solid var(--color-primary); padding: var(--space-4); margin: var(--space-4) 0; border-radius: 4px; background: var(--color-bg-alt);">
  <h4 style="margin-top: 0; font-size: 1.1rem; color: var(--color-text-primary);">{{ include.title }}</h4>
  <p style="margin-bottom: var(--space-2); font-size: 0.95rem; color: var(--color-text-secondary);">{{ include.description }}</p>
  <a href="/glossary/#{{ include.title | slugify }}" style="font-size: 0.9rem; font-weight: 500; text-decoration: none; color: var(--color-primary);">Read more di Glosarium &rarr;</a>
</div>
