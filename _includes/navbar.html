<!-- Navbar -->
<nav class="navbar" id="navbar" aria-label="Main navigation">
  <div class="navbar-inner">
    <!-- Brand -->
    <a href="{{ '/' | relative_url }}" class="navbar-brand">
      <span class="logo-mark">R</span>
      <span class="brand-text">{{ site.title }}</span>
    </a>

    <!-- Desktop Menu -->
    <ul class="navbar-menu">
      {% for item in site.data.nav %}
        <li class="navbar-item">
          <a href="{{ item.url | relative_url }}"
             class="navbar-link {% if page.url == item.url %}active{% endif %}">
            {{ item.title }}
          </a>
        </li>
      {% endfor %}
    </ul>

    <!-- Actions -->
    <div class="navbar-actions">
      <!-- Search Button -->
      <button class="btn-icon navbar-search-btn" id="search-toggle"
              aria-label="Search" title="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>

      <!-- Theme Toggle -->
      <button class="btn-icon theme-toggle-btn" id="theme-toggle"
              aria-label="Toggle theme" title="Toggle theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             style="display:none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <!-- Mobile Menu Toggle -->
      <button class="navbar-mobile-toggle" id="mobile-toggle"
              aria-label="Menu" title="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobile-menu">
  {% for item in site.data.nav %}
    <a href="{{ item.url | relative_url }}"
       class="navbar-link {% if page.url == item.url %}active{% endif %}">
      {{ item.title }}
    </a>
  {% endfor %}
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="search-overlay">
  <div class="search-panel">
    <div class="search-header">
      <div class="search-input-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="form-input" id="search-input"
               placeholder="Search articles, tags, content..." autocomplete="off">
      </div>
      <button class="search-close" id="search-close" aria-label="Close search">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="search-results" id="search-results"></div>
  </div>
</div>
