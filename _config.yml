title: M. Rohadiz
name: M. Rohadiz
description: >-
  Digital Garden oleh M. Rohadiz — Software Architect yang mengeksplorasi
  AI Engineering, Decision Intelligence, Infrastructure, Software Architecture,
  dan Crypto Observation melalui catatan dan artikel berbasis data.
tagline: Keputusan yang baik lahir dari observasi yang baik.
baseurl: ""
url: "https://mrohadiz.github.io"
lang: id
timezone: Asia/Jakarta
title_separator: "|"
permalink: /:year/:month/:day/:title/
markdown: kramdown
theme: null

# Author
author:
  name: M. Rohadiz
  email: ""
  twitter: mrohadiz
  github: mrohadiz
  linkedin: mrohadiz

# Social links (used by jekyll-seo-tag)
social:
  name: M. Rohadiz
  links:
    - https://github.com/mrohadiz
    - https://linkedin.com/in/mrohadiz

# Google Analytics (fill in your GA4 measurement ID)
google_analytics: "G-MXLDX3VRVH"

# Twitter username for twitter:site meta tag
twitter:
  username: mrohadiz

# Kramdown settings
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 2..3
  syntax_highlighter: rouge

# Rouge syntax highlighting
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Pagination
paginate: 12
paginate_path: "/notes/page:num/"

# Feed
feed:
  path: feed.xml

# Search enabled
search: true

# Exclude from build
exclude:
  - node_modules
  - vendor
  - README.md
  - .gitignore
  - trace_audit.log
  - package.json
  - package-lock.json
  - playwright.config.ts
  - tests/
  - playwright-report/
  - test-results/
  - report_dir


# Include
include:
  - _pages
  - robots.txt

# Collections
collections:
  notes:
    output: true
    permalink: /notes/:path/
  projects:
    output: true
    permalink: /projects/:path/

# Defaults
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "article"
      toc: true
  - scope:
      path: "_notes"
      type: "notes"
    values:
      layout: "article"
      toc: true
  - scope:
      path: "_projects"
      type: "projects"
    values:
      layout: "page"
  - scope:
      path: "_pages"
    values:
      layout: "page"
